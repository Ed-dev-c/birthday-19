name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Отключаем warning про Node 20 (опционально, можно убрать после июня 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Явно используем Node 24
      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Отладка: проверим что файлы на месте
      - name: Check files
        run: |
          ls -la
          cat package.json | grep -A 5 '"scripts"'

      - name: Install dependencies
        run: npm ci

      # Сборка с правильным base URL для GitHub Pages
      - name: Build
        env:
          # Для Vite (рекомендуется):
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          # Для Create React App (раскомментируй если нужно):
          # PUBLIC_URL: /${{ github.event.repository.name }}/
        run: npm run build

      # Отладка: проверим что создалась папка dist/build
      - name: Check build output
        run: |
          ls -la dist 2>/dev/null || ls -la build 2>/dev/null || echo "Папка не найдена!"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Для Vite:
          path: './dist'
          # Для Create React App раскомментируй:
          # path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
